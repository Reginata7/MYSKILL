<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Development Introduction</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        /* style form */
        .form-group {
            display: flex;
            width: 300px;
            flex-direction: column;
            gap: 25px;
            margin-top: 40px;
            margin-bottom: 50px;
            border-radius: 10px;
            text-align: center;
            background-color: rgb(211, 211, 211);
            padding: 30px;
        }

        .form-group button {
            width: 80px;
            padding: 5px;
            background-color: rgb(5, 155, 55);
            color: white;
            border: none;
            align-self: flex-end;
            cursor: pointer;
        }

        #main-form {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #main-form input, textarea {
            padding: 5px;
            letter-spacing: 1px;
            font-size: 14px;
        }

        /* style table */

        #table-main {
            width: fit-content;
            border-spacing: 0;
            border-collapse: collapse;
            text-align: left;
        }

        #table-main th {
            background-color: rgb(151, 151, 151);
        }

        #table-main td, th {
            padding: 10px;
        }

        .hidden {
            display: none;
        }

    </style>
</head>
<body>

    <div class="form-group">
        <h1>Form Data Diri</h1>

        <form id="main-form">
            <label for="nama">Nama</label>
            <input type="text" name="nama" id="nama">
            <label for="email">Email</label>
            <input type="email" name="email" id="email">
            <label for="alamat">Alamat</label>
            <textarea name="alamat" id="alamat" rows="5"></textarea>
        </form>

        <button type="submit" id="submit">Submit</button>
    </div>

    <table id="table-main" class="hidden" border="1">
        <tr class="baris"><th>Nama</th></tr>
        <tr class="baris"><th>Email</th></tr>
        <tr class="baris"><th>Alamat</th></tr>
    </table>
    


    <script>
        const tombol = document.getElementById("submit");
        const form = document.getElementById("main-form");
        const tabel = document.getElementById("table-main");

        tombol.addEventListener('click', function(e) {
            e.preventDefault();

            const nilaiNama = document.getElementById("nama").value.trim();
            const nilaiEmail = document.getElementById("email").value.trim();
            const nilaiAlamat = document.getElementById("alamat").value.trim();

            if (nilaiNama === "" || nilaiEmail === "" || nilaiAlamat === "") {
                alert('Data tidak boleh kosong!');
                return;
            };

            const masukBaris = document.querySelectorAll(".baris");

            const selNama = masukBaris[0].insertCell(-1);
            const selEmail = masukBaris[1].insertCell(-1);
            const selAlamat = masukBaris[2].insertCell(-1);
            selNama.textContent = nilaiNama;
            selEmail.textContent = nilaiEmail;
            selAlamat.textContent = nilaiAlamat;

            tabel.classList.remove("hidden");

            form.reset();
        })

    </script>
</body>
</html>
